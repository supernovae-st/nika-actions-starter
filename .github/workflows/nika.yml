# Nika CI: every push and PR gets a receipt.
#
# The action runs `nika check` statically (zero secrets, safe on any event)
# and posts a sticky PR comment with the verdict: the plan, an honest cost
# floor, the models/secrets each flow wants, the DAG. Nothing is executed.
#
# On PRs from forks the default token is read-only, so the body lands in the
# step summary instead of a comment. Never grant pull_request_target here.
name: nika check
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        flow:
          - flows/pr-risk-review.nika.yaml
          - flows/daily-brief.nika.yaml
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: supernovae-st/nika-action@v1  # first-party · tracks the action's release tag by design
        with:
          workflow: ${{ matrix.flow }}
          mode: check
          comment: 'true'
